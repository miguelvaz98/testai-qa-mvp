<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestAI-QA — Generador de Tests con IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="w-full max-w-2xl space-y-6">

    <!-- Header -->
    <div class="text-center">
      <h1 class="text-3xl font-bold text-white">TestAI-QA</h1>
      <p class="text-gray-400 mt-1">Pega tu código o historia de usuario y genera tests al instante.</p>
    </div>

    <!-- Input -->
    <textarea id="inputCode"
      class="w-full h-44 bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm font-mono resize-none focus:outline-none focus:border-indigo-500"
      placeholder="Pega aquí tu código frontend o historia de usuario..."></textarea>

    <!-- Framework selector -->
    <div class="flex gap-3">
      <label class="text-sm text-gray-400 self-center">Framework:</label>
      <select id="framework"
        class="bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
        <option value="playwright">Playwright</option>
        <option value="cypress">Cypress</option>
        <option value="jest">Jest</option>
      </select>
      <button id="generateBtn" onclick="generate()"
        class="ml-auto bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold px-6 py-2 rounded-lg transition">
        Generar Tests
      </button>
    </div>

    <!-- Output -->
    <div id="outputBox" class="hidden">
      <div class="flex justify-between items-center mb-2">
        <span class="text-xs text-gray-500" id="tokenCount"></span>
        <button onclick="copyOutput()" class="text-xs text-indigo-400 hover:text-indigo-300">Copiar</button>
      </div>
      <pre id="output"
        class="bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm font-mono overflow-x-auto whitespace-pre-wrap"></pre>
    </div>

    <!-- Error -->
    <div id="errorBox" class="hidden bg-red-900/40 border border-red-700 rounded-lg p-4 text-sm text-red-300"></div>

    <!-- Upgrade CTA (shown when trial exhausted) -->
    <div id="upgradeBox" class="hidden bg-indigo-950 border border-indigo-700 rounded-lg p-5 text-center space-y-3">
      <p class="text-indigo-200 font-semibold">Has agotado las 5 pruebas gratuitas.</p>
      <p class="text-gray-400 text-sm">Continúa generando tests sin límite por solo <strong class="text-white">$9/mes</strong>.</p>
      <button onclick="startCheckout()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-2 rounded-lg transition">
        Actualizar ahora — $9/mes
      </button>
    </div>

    <!-- Trials counter -->
    <p class="text-center text-xs text-gray-600" id="trialsMsg"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
