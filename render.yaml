services:
  - type: web
    name: testai-qa-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port ${PORT}"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
